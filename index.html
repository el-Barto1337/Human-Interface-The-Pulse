<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSMOS SYNTESE - GEFÜHL</title>

    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; /* Android-sicher */
            margin: 0; 
            overflow: hidden;
        }

        .display { 
            text-align: center; 
            width: 90%; 
        }

        #word { 
            font-size: clamp(3rem, 15vw, 6rem); 
            font-weight: 900; 
            letter-spacing: -3px; 
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #444444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.8s ease-in-out;
        }

        #context { 
            font-size: 0.7rem; 
            color: #777; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 25px;
            border-top: 1px solid #111;
            padding-top: 10px;
        }

        .pulse {
            width: 40px;
            height: 2px;
            background: #ffd700;
            margin: 20px auto;
            opacity: 0.4;
            box-shadow: 0 0 10px #ffd700;
        }
    </style>
</head>
<body>

<div class="display">
    <div id="word">FÜHLEN...</div>
    <div class="pulse"></div>
    <div id="context">Uhrwerk wird synchronisiert</div>
</div>

<script>
const FocusDB = {
    "Widder": "AUFBRUCH",
    "Stier": "VERWURZELN",
    "Zwillinge": "AUSTAUSCH",
    "Krebs": "GEBORGENHEIT",
    "Löwe": "PRÄSENZ",
    "Jungfrau": "KLÄREN",
    "Waage": "EINKLANG",
    "Skorpion": "WANDLUNG",
    "Schütze": "WEITE",
    "Steinbock": "HALT",
    "Wassermann": "FREIHEIT",
    "Fische": "STILLE"
};

const ZodiacList = Object.keys(FocusDB);

function getMoonSign(now) {
    const JD = (now.getTime() / 86400000) + 2440587.5;
    const T = (JD - 2451545.0) / 36525;
    let lon = (218.316 + 481267.881 * T) + 6.289 * Math.sin((134.963 + 477198.867 * T) * Math.PI / 180);
    lon = lon % 360; 
    if (lon < 0) lon += 360;
    return ZodiacList[Math.floor(lon / 30)];
}

function getSunSign(now) {
    const m = now.getMonth() + 1;
    const d = now.getDate();
    if ((m == 3 && d >= 21) || (m == 4 && d <= 19)) return "Widder";
    if ((m == 4 && d >= 20) || (m == 5 && d <= 20)) return "Stier";
    if ((m == 5 && d >= 21) || (m == 6 && d <= 20)) return "Zwillinge";
    if ((m == 6 && d >= 21) || (m == 7 && d <= 22)) return "Krebs";
    if ((m == 7 && d >= 23) || (m == 8 && d <= 22)) return "Löwe";
    if ((m == 8 && d >= 23) || (m == 9 && d <= 22)) return "Jungfrau";
    if ((m == 9 && d >= 23) || (m == 10 && d <= 22)) return "Waage";
    if ((m == 10 && d >= 23) || (m == 11 && d <= 21)) return "Skorpion";
    if ((m == 11 && d >= 22) || (m == 12 && d <= 21)) return "Schütze";
    if ((m == 12 && d >= 22) || (m == 1 && d <= 19)) return "Steinbock";
    if ((m == 1 && d >= 20) || (m == 2 && d <= 18)) return "Wassermann";
    return "Fische";
}

function update() {
    const now = new Date();
    const s = getSunSign(now);
    const m = getMoonSign(now);
    const h = ZodiacList[(now.getHours() % 12)];
    const min = ZodiacList[Math.floor(now.getMinutes() / 5)];

    const gearVotes = [s, m, h, min];
    const counts = {};
    counts[min] = 0.1;

    gearVotes.forEach(z => {
        counts[z] = (counts[z] || 0) + 1;
    });

    let winner = min;
    for (let z in counts) {
        if (counts[z] > counts[winner]) winner = z;
    }

    const mainWord = FocusDB[winner];
    const wordEl = document.getElementById('word');
    const contextEl = document.getElementById('context');

    if (wordEl && wordEl.textContent !== mainWord) {
        wordEl.textContent = mainWord;
    }

    if (contextEl) {
        contextEl.textContent = `Sonne: ${s} • Mond: ${m} • Stunde: ${h} • Minute: ${min}`;
    }
}

window.onload = function() {
    update();
    setInterval(update, 5000);
};
</script>

</body>
</html>
